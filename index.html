<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sopadri: Sopa de letras</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFCF0;
            --text-color: #4A4A4A;
            --accent-pink: #FFCFD2;
            --accent-mint: #B9FBC0;
            --accent-blue: #A2D2FF;
            --accent-lavender: #CFBCFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
            text-align: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #333;
        }

        .description {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.6;
            color: #666;
        }

        .playstore-btn {
            display: inline-block;
            background-color: var(--accent-pink);
            color: #333;
            text-decoration: none;
            padding: 1rem 2.5rem;
            border-radius: 50px;
            font-weight: 500;
            font-size: 1.1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(255, 207, 210, 0.4);
        }

        .playstore-btn:hover {
            transform: scale(1.05);
            background-color: var(--accent-mint);
            box-shadow: 0 6px 20px rgba(185, 251, 192, 0.5);
        }

        .playstore-btn:active {
            transform: scale(0.98);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .footer-links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            position: relative;
        }

        .footer-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--accent-blue);
            transition: width 0.3s;
        }

        .footer-links a:hover {
            color: #555;
        }

        .footer-links a:hover::after {
            width: 100%;
        }

        .contact {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #aaa;
        }

        .contact a {
            color: #aaa;
            text-decoration: none;
        }

        .contact a:hover {
            color: var(--accent-lavender);
        }

        /* Minimalist icon representation */
        .icon-placeholder {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-pink), var(--accent-blue));
            margin: 0 auto;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2rem;
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="icon-placeholder">S</div>
            <h1>Sopadri: Sopa de letras</h1>
            <p class="description">El juego de sopa de letras definitivo. Relájate y desafía tu mente con una interfaz limpia y colorida.</p>
        </header>

        <section>
            <a href="https://play.google.com/store/apps/details?id=com.gaanno.sopadri" class="playstore-btn" target="_blank">
                Descargar en Play Store
            </a>
        </section>

        <footer>
            <div class="footer-links">
                <a href="/privacy.html">Privacidad</a>
                <a href="/terms_conditions.html">Términos y Condiciones</a>
            </div>
            <div class="contact">
                Contacto: <a href="mailto:sopadri.app@gmail.com">sopadri.app@gmail.com</a>
            </div>
        </footer>
    </div>

</body>
</html>
